services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ferrorama
      MYSQL_ROOT_PASSWORD: ferrorama
    volumes:
      - ferroviaria_db:/var/lib/mysql
      - ./database/schema/ferrorama.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pferrorama"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: ferrorama
      DB_NAME: ferrorama
    ports:
      - "8000:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  ferroviaria_db:
